<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login - AlugaAi</title>
  <link rel="stylesheet" href="style_login_dashboard.css" />
</head>
<body>
  <div class="container">
    <a href="index.html" class="back-link">← Voltar ao início</a>
    <h2>Entrar</h2>
    <div id="error-msg" class="error-msg" style="display:none;">Email ou senha inválidos.</div>
    <form id="login-form">
      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="senha" placeholder="Senha" required />
      <button type="submit">Entrar</button>
    </form>
    <p style="margin-top: 1.2rem; text-align: center; color: #ccc;">
      Não tem uma conta? <a href="register.html" style="color:#f39c12; text-decoration:none;">Inscreva-se</a>
    </p>
  </div>

  <script>
    // Simulação de login para demonstração no portfólio
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const senha = document.getElementById('senha').value;

      // Credenciais de demo
      if (email === 'demo@alugaai.com' && senha === '123456') {
        sessionStorage.setItem('user', JSON.stringify({ nome: 'Usuário Demo', email }));
        window.location.href = 'dashboard.html';
      } else {
        document.getElementById('error-msg').style.display = 'block';
      }
    });
  </script>
</body>
</html>
