<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cadastrar Item - AlugaAi</title>
  <link rel="stylesheet" href="style_login_dashboard.css" />
</head>
<body>
  <div class="container">
    <a href="dashboard.html" class="back-link">← Voltar à minha conta</a>
    <h2>Cadastrar Item</h2>
    <div id="error-msg" class="error-msg" style="display:none;"></div>
    <form id="form-item">
      <input type="text" id="titulo" placeholder="Título do item" required />
      <select id="categoria" required>
        <option value="" disabled selected>Selecione uma categoria</option>
        <option value="cozinha">Cozinha</option>
        <option value="marcenaria">Marcenaria</option>
        <option value="informatica">Informática</option>
        <option value="outros">Outros</option>
      </select>
      <textarea id="descricao" placeholder="Descrição do item (opcional)" rows="4"></textarea>
      <button type="submit">Cadastrar</button>
    </form>
  </div>

  <script>
    if (!sessionStorage.getItem('user')) window.location.href = 'login.html';

    document.getElementById('form-item').addEventListener('submit', function(e) {
      e.preventDefault();
      const titulo    = document.getElementById('titulo').value.trim();
      const categoria = document.getElementById('categoria').value;
      const descricao = document.getElementById('descricao').value.trim();
      const err       = document.getElementById('error-msg');

      if (!titulo || !categoria) {
        err.textContent = 'Preencha todos os campos corretamente.';
        err.style.display = 'block';
        return;
      }

      const itens = JSON.parse(sessionStorage.getItem('itens') || '[]');
      itens.push({ titulo, categoria, descricao });
      sessionStorage.setItem('itens', JSON.stringify(itens));
      window.location.href = 'dashboard.html';
    });
  </script>
</body>
</html>
